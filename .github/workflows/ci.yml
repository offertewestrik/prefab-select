name: CI

# Builds the app (incl. the AanbouwPlatform / uitbouw platform) on every push to
# a working branch and on every PR, so a broken build is caught before merge.

on:
  push:
    branches: ["claude/**", "main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
