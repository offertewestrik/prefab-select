name: Deploy Law Firm Demo to GitHub Pages

# Publishes the standalone law-firm-dubai static site to GitHub Pages.
# Does NOT affect the Firebase-hosted production site (prefabselect.nl).

on:
  push:
    branches: ["main"]
    paths:
      - "law-firm-dubai/**"
      - ".github/workflows/law-firm-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Assemble site
        run: |
          mkdir -p _site/law-firm-dubai
          cp -r law-firm-dubai/. _site/law-firm-dubai/
          # Root redirect so both / and /law-firm-dubai/ work
          cat > _site/index.html <<'HTML'
          <!doctype html><html lang="en"><head><meta charset="utf-8">
          <title>Meridian Crowne</title>
          <meta http-equiv="refresh" content="0; url=./law-firm-dubai/">
          <link rel="canonical" href="./law-firm-dubai/"></head>
          <body>Redirecting to <a href="./law-firm-dubai/">Meridian Crowne</a>…</body></html>
          HTML

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
