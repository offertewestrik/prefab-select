name: Deploy to GitHub Pages

# Builds the frontend and publishes it to the gh-pages branch so the site
# (including the Nexora Growth page at /ai-agency) is viewable at:
#   https://offertewestrik.github.io/prefab-select/
# After the first run: Settings → Pages → Source: "Deploy from a branch" → gh-pages / (root).

on:
  push:
    branches:
      - claude/vigilant-gauss-g95577
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (subpath base for Pages)
        run: npx vite build --base=/prefab-select/

      - name: SPA fallback + disable Jekyll
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
