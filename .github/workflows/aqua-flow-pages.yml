name: Deploy Al Naqaa site to GitHub Pages

# Builds the static export of the Al Naqaa (aqua-flow) site on GitHub's
# runners and publishes it to GitHub Pages. Does not touch the Prefab Select
# app or its Firebase hosting.

on:
  push:
    branches: [claude/gifted-lamport-qnr831]
    paths:
      - "aqua-flow/**"
      - ".github/workflows/aqua-flow-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aqua-flow
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: aqua-flow/package-lock.json
      - run: npm ci
      - name: Build static export
        run: npm run build
        env:
          # Project Pages are served from /<repo>; ship assets under that path.
          NEXT_PUBLIC_BASE_PATH: /prefab-select
          # Absolute site URL for canonical, sitemap, robots and OG tags.
          NEXT_PUBLIC_SITE_URL: https://offertewestrik.github.io/prefab-select
      - uses: actions/upload-pages-artifact@v3
        with:
          path: aqua-flow/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
