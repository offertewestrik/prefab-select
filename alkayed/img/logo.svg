<svg width="520" height="430" viewBox="0 0 520 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="لبان الكايد - أجبان وألبان طبيعية">
  <defs>
    <linearGradient id="ak-green" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#6cc23f"/>
      <stop offset="1" stop-color="#2c8a1f"/>
    </linearGradient>
    <linearGradient id="ak-red" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#e23b2a"/>
      <stop offset="1" stop-color="#bf2114"/>
    </linearGradient>
    <linearGradient id="ak-gold" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#f0d894"/>
      <stop offset="1" stop-color="#c39a3f"/>
    </linearGradient>
  </defs>

  <!-- green arc -->
  <path d="M70 150 A210 210 0 0 1 450 150" fill="none" stroke="url(#ak-green)" stroke-width="22" stroke-linecap="round"/>

  <!-- green leaf badge with لبان -->
  <g transform="translate(338 96)">
    <path d="M8 70C8 30 60 -2 150 6c8 60-24 104-92 104C26 110 8 96 8 70z" fill="url(#ak-green)"/>
    <path d="M40 92c30-34 60-52 96-60" stroke="#bfe6a3" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.8"/>
    <text x="86" y="74" text-anchor="middle" font-family="'Cairo','Tajawal',sans-serif" font-size="56" font-weight="800" fill="#ffffff">لبان</text>
  </g>

  <!-- main wordmark الكايد -->
  <text x="260" y="280" text-anchor="middle" font-family="'Cairo','Tajawal',sans-serif" font-size="150" font-weight="900"
        fill="url(#ak-red)" stroke="url(#ak-gold)" stroke-width="6" paint-order="stroke" stroke-linejoin="round">الكايد</text>

  <!-- gold tagline rule -->
  <path d="M150 330 q110 24 220 0" fill="none" stroke="url(#ak-gold)" stroke-width="4" stroke-linecap="round"/>
  <text x="260" y="372" text-anchor="middle" font-family="'Tajawal',sans-serif" font-size="30" font-weight="700" fill="#2c8a1f">أجبان وألبان طبيعية</text>
</svg>
