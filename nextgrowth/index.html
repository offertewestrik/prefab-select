<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>NextGrowth — Wij bouwen digitale groeisystemen</title>
<meta name="description" content="NextGrowth bouwt digitale groeisystemen: websites, webshops, AI-automatisering, 3D-configurators en live dashboards. Actief in Nederland, Dubai en Jordanië." />
<meta name="theme-color" content="#060608" />
<meta property="og:type" content="website" />
<meta property="og:title" content="NextGrowth — Digitale Groeisystemen" />
<meta property="og:description" content="Websites, AI-automatisering, 3D-configurators en dashboards — als één verbonden groeisysteem. Nederland · Dubai · Jordanië." />
<meta property="og:image" content="assets/logo.svg" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&family=Tajawal:wght@400;500;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0F172A; --ink2:#334155; --muted:#64748B; --line:#E6EBF2;
  --bg:#FFFFFF; --bg2:#F8FAFC; --bg3:#F1F5F9;
  --dark:#0B0B0F; --dark2:#060608; --panel:#16161C;
  --blue:#D4AF37; --blue2:#E9C155; --g1:#FFF3C4; --g2:#D4AF37;
  --on-dark:#E7E5E4; --on-dark-mut:#A8A29E;
  --maxw:1200px; --ease:cubic-bezier(.22,.7,.3,1);
  --shadow-s:0 2px 8px -2px rgba(15,23,42,.08);
  --shadow-m:0 24px 60px -34px rgba(15,23,42,.30);
  --radius:22px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Inter",system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
h1,h2,h3,h4{font-family:"Sora","Plus Jakarta Sans",sans-serif;font-weight:800;letter-spacing:-.025em;line-height:1.05;margin:0;color:var(--ink)}
p{margin:0}
.mono{font-family:"JetBrains Mono",monospace}
.gold{background:linear-gradient(135deg,#FFF3C4,#D4AF37 42%,#B8860B 70%,#FFE9A3);-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px;position:relative}
.display{font-size:clamp(42px,6vw,78px)}
.h2{font-size:clamp(32px,4.4vw,56px)}
.lead{font-size:clamp(18px,1.5vw,21px);color:var(--muted);font-weight:400;line-height:1.55}
.eyebrow{display:inline-flex;align-items:center;gap:9px;font-family:"Sora","Plus Jakarta Sans";font-weight:700;font-size:13px;letter-spacing:.04em;color:var(--blue);text-transform:uppercase}
.eyebrow .dot{width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--g2))}
.eyebrow.on-dark{color:#FFE9A3}
.btn{font-family:"Sora","Plus Jakarta Sans";font-weight:700;font-size:15.5px;padding:15px 28px;border-radius:13px;border:1px solid transparent;cursor:pointer;transition:transform .35s var(--ease),box-shadow .35s,background .35s,border-color .35s;display:inline-flex;align-items:center;gap:9px}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#0B0B0F;box-shadow:0 14px 34px -14px rgba(212,175,55,.7)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 22px 48px -16px rgba(212,175,55,.85)}
.btn-ghost{background:#fff;border-color:var(--line);color:var(--ink);box-shadow:var(--shadow-s)}
.btn-ghost:hover{transform:translateY(-2px);border-color:#CBD5E1}
.btn-darkghost{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.16);color:#fff}
.btn-darkghost:hover{background:rgba(255,255,255,.12)}
.section{padding:clamp(88px,11vw,160px) 0;position:relative}
.section--alt{background:var(--bg2)}
.section--dark{background:var(--dark);color:var(--on-dark)}
.section--dark h1,.section--dark h2,.section--dark h3{color:#fff}
.section--dark .lead{color:var(--on-dark-mut)}
.section-head{max-width:760px;margin:0 auto clamp(54px,7vw,82px);text-align:center}
.section-head.left{text-align:left;margin-left:0}
.section-head .h2{margin-top:18px}
.section-head .lead{margin-top:22px}
.reveal{opacity:0;transform:translateY(28px);transition:opacity 1s var(--ease),transform 1s var(--ease)}
.reveal.in{opacity:1;transform:none}
.d1{transition-delay:.08s}.d2{transition-delay:.16s}.d3{transition-delay:.24s}.d4{transition-delay:.32s}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;transition:background .4s,box-shadow .4s,border-color .4s;border-bottom:1px solid transparent}
.nav.solid{background:rgba(255,255,255,.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-color:var(--line)}
.nav .row{display:flex;align-items:center;height:70px;gap:30px}
.brand{display:flex;align-items:center;gap:11px;font-family:"Sora","Plus Jakarta Sans";font-weight:800;font-size:21px;letter-spacing:.06em;color:#fff;transition:color .4s}
.nav.solid .brand{color:var(--ink)}
.brand .mark{width:30px;height:30px;border-radius:9px;overflow:hidden;display:block;flex:none;box-shadow:0 6px 18px -6px rgba(212,175,55,.8)}
.brand .mark svg{width:100%;height:100%;display:block}
.navlinks{display:flex;gap:26px;margin-left:6px}
.navlinks a{font-size:15px;font-weight:500;color:rgba(255,255,255,.82);transition:color .4s;white-space:nowrap}
.nav.solid .navlinks a{color:var(--ink2)}
.navlinks a:hover{color:var(--blue2)}
.nav .spacer{margin-left:auto}
.nav .btn{padding:11px 18px;font-size:14px}
.nav .btn-nav{background:#fff;color:var(--ink)}
.nav.solid .btn-nav{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#0B0B0F}
.langsw{display:flex;gap:2px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:3px}
.nav.solid .langsw{background:var(--bg3);border-color:var(--line)}
.langsw button{border:0;background:transparent;color:rgba(255,255,255,.82);font-family:"Sora","Plus Jakarta Sans";font-weight:600;font-size:12.5px;padding:6px 9px;border-radius:7px;cursor:pointer;transition:.2s}
.nav.solid .langsw button{color:var(--ink2)}
.langsw button.on{background:#fff;color:var(--ink)}
.nav.solid .langsw button.on{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#0B0B0F}
@media(max-width:980px){.navlinks{display:none}}

/* HERO */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;background:var(--dark2);overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg::before{content:"";position:absolute;inset:0;background:radial-gradient(900px 600px at 78% 18%,rgba(212,175,55,.20),transparent 60%),radial-gradient(800px 600px at 12% 80%,rgba(233,193,85,.14),transparent 60%),linear-gradient(180deg,#060608,#0B0B0F 70%,#060608)}
.hero-bg::after{content:"";position:absolute;inset:0;opacity:.5;background-image:linear-gradient(rgba(148,163,184,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(148,163,184,.06) 1px,transparent 1px);background-size:64px 64px;mask:radial-gradient(1100px 700px at 50% 30%,#000,transparent 80%)}
#hero-canvas{position:absolute;inset:0;z-index:1;opacity:0;transition:opacity 1.6s ease}
#hero-canvas.in{opacity:1}
.hero .wrap{z-index:3;padding-top:96px;padding-bottom:60px}
.hero-inner{max-width:700px}
.hero .display{color:#fff;margin-top:24px}
.hero .display .grad{background:linear-gradient(110deg,var(--g1),var(--g2));-webkit-background-clip:text;background-clip:text;color:transparent}
.hero .lead{color:#B7B2A6;margin-top:26px;max-width:36em}
.hero-cta{display:flex;gap:14px;flex-wrap:wrap;margin-top:38px}
.hero-trust{margin-top:54px}
.hero-trust .t{font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;color:#8A8170;font-weight:600}
.hero-logos{display:flex;gap:28px;flex-wrap:wrap;align-items:center;margin-top:18px;opacity:.85}
.hero-logos span{font-family:"Sora","Plus Jakarta Sans";font-weight:700;font-size:16px;color:#8C846F}
.hero-fade{position:absolute;left:0;right:0;bottom:0;height:140px;z-index:2;background:linear-gradient(transparent,var(--dark2));pointer-events:none}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.stat{text-align:center;padding:14px}
.stat .n{font-family:"Sora","Plus Jakarta Sans";font-weight:800;font-size:clamp(34px,4vw,52px);background:linear-gradient(135deg,var(--blue),var(--g2));-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:-.03em}
.stat .l{color:var(--muted);font-size:15px;margin-top:6px}
@media(max-width:720px){.stats{grid-template-columns:repeat(2,1fr);gap:30px 18px}}

/* CARDS (services + industries) */
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.svc{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:28px;transition:transform .45s var(--ease),box-shadow .45s,border-color .45s;position:relative;overflow:hidden}
.svc:hover{transform:translateY(-6px);box-shadow:var(--shadow-m);border-color:#EADFB8}
.svc .ic{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;margin-bottom:20px;background:linear-gradient(135deg,#FBF6E6,#F7EFD4);border:1px solid #EFE3BD}
.svc .ic svg{width:25px;height:25px;stroke:var(--blue);fill:none;stroke-width:1.7}
.svc h3{font-size:21px;font-weight:700;margin-bottom:9px}
.svc p{color:var(--muted);font-size:15px}
@media(max-width:980px){.svc-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.svc-grid{grid-template-columns:1fr}}

/* IMAGERY */
.photoband{position:relative;border-radius:26px;overflow:hidden;min-height:clamp(300px,40vw,420px);display:flex;align-items:flex-end;box-shadow:var(--shadow-m);background:#0B0B0F center/cover no-repeat}
.photoband::after{content:"";position:absolute;inset:0;background:linear-gradient(95deg,rgba(6,6,8,.88),rgba(11,11,15,.45) 55%,rgba(212,175,55,.30))}
.photoband .pb-content{position:relative;z-index:2;padding:clamp(28px,4.6vw,56px);max-width:640px}
.photoband .pb-content h3{color:#fff;font-size:clamp(26px,3.4vw,42px)}
.photoband .pb-content p{color:rgba(255,255,255,.84);margin-top:14px;font-size:clamp(15px,1.3vw,18px)}
.pb-chip{display:inline-flex;gap:9px;align-items:center;margin-bottom:18px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.24);backdrop-filter:blur(8px);padding:8px 15px;border-radius:100px;font-size:13px;font-weight:600;color:#fff}
.pb-chip i{width:7px;height:7px;border-radius:50%;background:#FFE9A3;box-shadow:0 0 8px #FFE9A3}
.feat{display:grid;grid-template-columns:1fr 1fr;gap:clamp(36px,5vw,64px);align-items:center}
.feat .photo{border-radius:24px;min-height:clamp(300px,34vw,420px);background:#0B0B0F center/cover no-repeat;box-shadow:var(--shadow-m);position:relative;overflow:hidden}
.feat .photo::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(212,175,55,.22))}
.feat h3{font-size:clamp(28px,3.6vw,44px);margin-top:18px}
.feat p{color:var(--muted);margin-top:18px;font-size:17px}
.feat ul{list-style:none;padding:0;margin:26px 0 0;display:flex;flex-direction:column;gap:14px}
.feat li{display:flex;gap:13px;align-items:flex-start;font-size:16px;color:var(--ink2)}
.feat li .ck{width:23px;height:23px;border-radius:50%;flex:none;background:linear-gradient(135deg,var(--blue),var(--blue2));display:grid;place-items:center;color:#0B0B0F;font-size:12px;margin-top:1px}
@media(max-width:880px){.feat{grid-template-columns:1fr;gap:30px}.feat .photo{min-height:260px;order:-1}}

/* AUTOMATION */
.flow{display:grid;grid-template-columns:1.1fr .9fr;gap:54px;align-items:center}
.flow-card{background:linear-gradient(180deg,rgba(22,22,28,.7),rgba(8,8,11,.4));border:1px solid rgba(212,175,55,.14);border-radius:var(--radius);padding:14px 30px;position:relative;backdrop-filter:blur(10px)}
.flow-spine{position:absolute;left:52px;top:46px;bottom:46px;width:2px;background:rgba(212,175,55,.28);overflow:hidden}
.flow-spine .p{position:absolute;left:-2px;width:6px;height:64px;border-radius:6px;background:linear-gradient(var(--g1),transparent);box-shadow:0 0 18px var(--g1);animation:flowdown 3.6s linear infinite}
@keyframes flowdown{0%{top:-64px}100%{top:100%}}
.fstep{display:flex;align-items:center;gap:20px;padding:16px 0;position:relative;z-index:2}
.fstep .nd{width:46px;height:46px;flex:none;border-radius:13px;display:grid;place-items:center;background:rgba(8,8,11,.9);border:1px solid rgba(212,175,55,.22);transition:.35s;color:#E9D9A8}
.fstep.act .nd{border-color:var(--g2);box-shadow:0 0 28px -4px var(--g2);background:linear-gradient(135deg,rgba(212,175,55,.25),rgba(233,193,85,.18))}
.fstep .t{font-family:"Sora","Plus Jakarta Sans";font-weight:700;font-size:16.5px;color:#fff}
.fstep .s{font-size:13px;color:#8C846F}
.flow-side{background:rgba(22,22,28,.55);border:1px solid rgba(212,175,55,.16);border-radius:var(--radius);padding:14px 30px;backdrop-filter:blur(10px)}
.flow-side .row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid rgba(212,175,55,.12)}
.flow-side .row:last-child{border-bottom:0}
.flow-side .k{color:var(--on-dark-mut);font-size:14.5px}
.flow-side .v{font-family:"JetBrains Mono";font-size:14.5px;color:#fff}
.flow-side .v.up{color:#6EE7B7}
@media(max-width:900px){.flow{grid-template-columns:1fr;gap:34px}}

/* CONFIGURATOR */
.cfg{display:grid;grid-template-columns:1.35fr .85fr;gap:40px;align-items:stretch}
.device{border-radius:18px;overflow:hidden;box-shadow:var(--shadow-m);border:1px solid var(--line);background:#fff;min-height:520px;display:flex;flex-direction:column}
.device .bar{height:42px;display:flex;align-items:center;gap:8px;padding:0 16px;background:#F8FAFC;border-bottom:1px solid var(--line)}
.device .bar .dots{display:flex;gap:7px}
.device .bar .dots i{width:11px;height:11px;border-radius:50%}
.device .bar .url{margin:0 auto;font-family:"JetBrains Mono";font-size:12px;color:var(--muted);background:#fff;border:1px solid var(--line);padding:5px 16px;border-radius:8px}
.cfg-stage{position:relative;flex:1;background:radial-gradient(700px 460px at 50% 30%,#FBF6E6,#FAFAF7 70%)}
#cfg-canvas{position:absolute;inset:0;width:100%;height:100%}
.cfg-stage .hint{position:absolute;right:16px;top:14px;font-family:"JetBrains Mono";font-size:11px;color:var(--muted)}
.cfg-panel{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:28px;display:flex;flex-direction:column;gap:24px;box-shadow:var(--shadow-s)}
.cfg-tabs{display:flex;gap:6px;background:var(--bg3);padding:5px;border-radius:13px}
.cfg-tabs button{flex:1;padding:11px 8px;border:0;background:transparent;color:var(--muted);font-family:"Sora","Plus Jakarta Sans";font-weight:700;font-size:13px;border-radius:9px;cursor:pointer;transition:.25s}
.cfg-tabs button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow-s)}
.cfg-h{font-family:"Sora","Plus Jakarta Sans";font-weight:700;font-size:12.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:12px}
.swatches{display:flex;gap:11px;flex-wrap:wrap}
.sw{width:36px;height:36px;border-radius:10px;cursor:pointer;border:2px solid #fff;box-shadow:0 0 0 1px var(--line);transition:.2s}
.sw.on{box-shadow:0 0 0 2px var(--blue);transform:scale(1.08)}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border:1px solid var(--line);border-radius:13px;cursor:pointer;transition:.25s;font-size:15px;font-weight:500}
.opt:hover{border-color:#CBD5E1;background:var(--bg2)}
.toggle{width:44px;height:25px;border-radius:20px;background:#CBD5E1;position:relative;transition:.25s;flex:none}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:19px;height:19px;border-radius:50%;background:#fff;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.opt.on .toggle{background:linear-gradient(135deg,var(--blue),var(--blue2))}
.opt.on .toggle::after{left:22px}
.cfg-price{margin-top:auto;display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid var(--line);padding-top:20px}
.cfg-price .u{font-size:12.5px;color:var(--muted)}
.cfg-price .p{font-family:"Sora","Plus Jakarta Sans";font-weight:800;font-size:30px}
.cfg-chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:40px}
.cfg-chips .c{font-size:14px;font-weight:600;color:var(--ink2);background:#fff;border:1px solid var(--line);padding:10px 18px;border-radius:100px;box-shadow:var(--shadow-s)}
.cfg-chips .c span{color:var(--blue);margin-right:7px}
@media(max-width:920px){.cfg{grid-template-columns:1fr}.device{min-height:420px}}

/* PORTFOLIO */
.cases{display:grid;grid-template-columns:repeat(3,1fr);gap:26px}
.case{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;transition:transform .45s var(--ease),box-shadow .45s;display:flex;flex-direction:column}
.case:hover{transform:translateY(-6px);box-shadow:var(--shadow-m)}
.case .thumb{height:200px;position:relative;overflow:hidden;background-size:cover;background-position:center}
.case .thumb::after{content:"";position:absolute;inset:0;background:linear-gradient(155deg,rgba(212,175,55,.34),rgba(184,134,11,.14) 55%,rgba(6,6,8,.34));mix-blend-mode:multiply}
.case .thumb .ind{position:absolute;z-index:2;left:16px;top:14px;font-family:"JetBrains Mono";font-size:11px;color:#fff;background:rgba(11,11,15,.5);border:1px solid rgba(255,255,255,.25);padding:5px 11px;border-radius:8px;backdrop-filter:blur(6px)}
.case .body{padding:26px}
.case .tag{font-family:"JetBrains Mono";font-size:12px;color:var(--blue)}
.case h3{font-size:20px;font-weight:700;margin:10px 0 8px}
.case p{color:var(--muted);font-size:15px}
.case .metric{margin-top:18px;padding-top:18px;border-top:1px solid var(--line);display:flex;align-items:baseline;gap:10px}
.case .metric .big{font-family:"Sora","Plus Jakarta Sans";font-weight:800;font-size:30px;color:var(--ink)}
.case .metric .sm{font-size:13.5px;color:var(--muted)}
@media(max-width:980px){.cases{grid-template-columns:1fr;max-width:520px;margin:0 auto}}

/* DASHBOARD SHOWCASE */
.show-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:44px;align-items:center}
.dashpanel{background:linear-gradient(180deg,rgba(22,22,28,.85),rgba(8,8,11,.75));border:1px solid rgba(212,175,55,.16);border-radius:24px;padding:28px;box-shadow:0 50px 120px -50px rgba(0,0,0,.7);backdrop-filter:blur(12px)}
.dp-head{display:flex;justify-content:space-between;align-items:center}
.dp-head .ttl{font-family:"Sora","Plus Jakarta Sans";font-weight:700;font-size:15px;color:#fff}
.dp-head .live{font-family:"JetBrains Mono";font-size:11px;color:#6EE7B7;display:flex;align-items:center;gap:7px}
.dp-head .live i{width:7px;height:7px;border-radius:50%;background:#34D399;box-shadow:0 0 8px #34D399;animation:beat 1.6s infinite}
@keyframes beat{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.dp-rev{font-family:"Sora","Plus Jakarta Sans";font-weight:800;font-size:clamp(36px,4.5vw,52px);color:#fff;margin:12px 0 2px;letter-spacing:-.03em}
.dp-delta{font-family:"JetBrains Mono";font-size:13px;color:#6EE7B7}
.dp-chart{margin-top:18px;width:100%;height:200px}
.dp-foot{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:20px}
.dp-foot .c{background:rgba(8,8,11,.5);border:1px solid rgba(212,175,55,.12);border-radius:14px;padding:14px}
.dp-foot .c .l{font-size:11.5px;color:var(--on-dark-mut);text-transform:uppercase;letter-spacing:.05em}
.dp-foot .c .v{font-family:"Sora","Plus Jakarta Sans";font-weight:700;font-size:22px;color:#fff;margin-top:5px}
.kpi-float{position:relative;min-height:420px}
.kfloat{position:absolute;background:rgba(22,22,28,.78);border:1px solid rgba(212,175,55,.18);border-radius:18px;padding:18px 20px;min-width:170px;backdrop-filter:blur(14px);box-shadow:0 30px 60px -34px rgba(0,0,0,.8);animation:floaty 7s ease-in-out infinite}
.kfloat .l{font-size:12px;color:var(--on-dark-mut);text-transform:uppercase;letter-spacing:.05em}
.kfloat .v{font-family:"Sora","Plus Jakarta Sans";font-weight:800;font-size:30px;color:#fff;margin-top:6px;letter-spacing:-.02em}
.kfloat .d{font-family:"JetBrains Mono";font-size:12px;color:#6EE7B7;margin-top:4px}
.kfloat .spark{margin-top:8px;height:30px;width:100%}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.kfloat.k1{top:6%;left:2%}.kfloat.k2{top:30%;right:4%;animation-delay:-2.2s}.kfloat.k3{bottom:14%;left:10%;animation-delay:-4.4s}.kfloat.k4{bottom:0;right:14%;animation-delay:-1.2s}
@media(max-width:920px){.show-grid{grid-template-columns:1fr;gap:30px}.kpi-float{display:grid;grid-template-columns:1fr 1fr;gap:16px;min-height:0}.kfloat{position:static;animation:none}}

/* TESTIMONIALS */
.tlist{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.tcard{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:32px;box-shadow:var(--shadow-s);transition:transform .45s var(--ease),box-shadow .45s;display:flex;flex-direction:column}
.tcard:hover{transform:translateY(-5px);box-shadow:var(--shadow-m)}
.tcard .stars{color:#F59E0B;letter-spacing:3px;font-size:15px}
.tcard .q{font-size:17px;color:var(--ink2);margin-top:16px;line-height:1.6;flex:1}
.tcard .who{display:flex;align-items:center;gap:13px;margin-top:24px;padding-top:22px;border-top:1px solid var(--line)}
.tcard .av{width:46px;height:46px;border-radius:50%;flex:none;display:grid;place-items:center;font-family:"Sora","Plus Jakarta Sans";font-weight:700;color:#0B0B0F;font-size:16px}
.tcard .nm{font-family:"Sora","Plus Jakarta Sans";font-weight:700;font-size:15px}
.tcard .ro{font-size:13.5px;color:var(--muted)}
@media(max-width:980px){.tlist{grid-template-columns:1fr;max-width:520px;margin:0 auto}}

/* CTA + FOOTER */
.cta{position:relative;overflow:hidden;text-align:center;padding:clamp(96px,12vw,160px) 0}
.cta-bg{position:absolute;inset:0;z-index:0;background:center/cover no-repeat;opacity:.16}
.cta::before{content:"";position:absolute;inset:0;z-index:1;background:radial-gradient(700px 420px at 50% 0%,rgba(212,175,55,.28),transparent 60%),radial-gradient(600px 420px at 80% 100%,rgba(233,193,85,.22),transparent 60%)}
.cta .wrap{position:relative;z-index:2}
.cta .h2{color:#fff;max-width:18ch;margin:0 auto}
.cta .lead{color:#B7B2A6;margin:22px auto 0;max-width:48ch}
.cta-row{display:flex;gap:14px;justify-content:center;margin-top:36px;flex-wrap:wrap}
footer{background:var(--bg2);border-top:1px solid var(--line);padding:72px 0 40px}
.foot-top{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:30px}
.foot .brand{color:var(--ink)}
.foot p{color:var(--muted);font-size:15px;margin-top:16px;max-width:32ch}
.foot h5{font-family:"Sora","Plus Jakarta Sans";font-weight:700;font-size:14px;margin:0 0 14px}
.foot a{display:block;color:var(--muted);font-size:14.5px;margin-bottom:10px;transition:color .2s}
.foot a:hover{color:var(--blue)}
.foot-bot{display:flex;justify-content:space-between;align-items:center;margin-top:48px;padding-top:28px;border-top:1px solid var(--line);color:var(--muted);font-size:13.5px;flex-wrap:wrap;gap:12px}
@media(max-width:760px){.foot-top{grid-template-columns:1fr 1fr}}

/* CONTACT */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(36px,5vw,60px);align-items:start}
.contact-meta{margin-top:30px;display:flex;flex-direction:column;gap:14px}
.cmeta{display:flex;align-items:center;gap:12px;font-size:16px;color:var(--ink2);font-weight:500}
.cmeta .i{width:42px;height:42px;border-radius:12px;flex:none;display:grid;place-items:center;background:linear-gradient(135deg,#FBF6E6,#F7EFD4);border:1px solid #EFE3BD}
.cmeta .i svg{width:20px;height:20px;stroke:var(--blue);fill:none;stroke-width:1.8}
a.cmeta:hover{color:var(--blue)}
.contact-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:clamp(24px,3vw,36px);box-shadow:var(--shadow-m);display:flex;flex-direction:column;gap:16px}
.field{display:flex;flex-direction:column;gap:7px}
.field label{font-family:"Sora","Plus Jakarta Sans";font-weight:600;font-size:13px;color:var(--ink2)}
.field input,.field textarea{font-family:inherit;font-size:15px;color:var(--ink);background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:13px 15px;outline:none;transition:.2s;width:100%}
.field input:focus,.field textarea:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(212,175,55,.15)}
.field textarea{resize:vertical;min-height:110px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.contact-card .btn{justify-content:center;margin-top:4px}
.form-note{font-size:13px;color:var(--muted);text-align:center}
@media(max-width:880px){.contact-grid{grid-template-columns:1fr;gap:34px}.field-row{grid-template-columns:1fr}}

[dir=rtl] body,[dir=rtl] h1,[dir=rtl] h2,[dir=rtl] h3,[dir=rtl] h4{font-family:"Tajawal",sans-serif}

const numLocale={nl:'nl-NL',en:'en-US',ar:'en-US'};
let lang='nl', cur=L.nl;

/* nav solid */
(function(){const nav=$('#nav');const f=()=>nav.classList.toggle('solid',scrollY>40);f();addEventListener('scroll',f,{passive:true});})();

/* reveal */
const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}}),{threshold:.14});
function observeReveals(){$$('.reveal:not(.in)').forEach(e=>io.observe(e));}

/* counters */
function fmt(target,dec,pre,suf){return pre+target.toLocaleString(numLocale[lang],{minimumFractionDigits:dec,maximumFractionDigits:dec})+suf;}
function animateCount(el){
  const target=parseFloat(el.dataset.count),dec=parseInt(el.dataset.dec||0),pre=el.dataset.prefix||'',suf=el.dataset.suffix||'';
  const dur=1500,t0=performance.now();
  (function step(t){let p=Math.min(1,(t-t0)/dur);p=1-Math.pow(1-p,3);el.textContent=fmt(target*p,dec,pre,suf);if(p<1)requestAnimationFrame(step);else el.dataset.done="1";})(t0);
}
const cio=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){animateCount(e.target);cio.unobserve(e.target)}}),{threshold:.6});
function reformatCounters(){$$('[data-count][data-done]').forEach(el=>{const dec=parseInt(el.dataset.dec||0);el.textContent=fmt(parseFloat(el.dataset.count),dec,el.dataset.prefix||'',el.dataset.suffix||'');});}

/* render dynamic content from current language */
function render(){
  $$('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(cur[k]!=null)el.textContent=cur[k];});
  const sg=$('#svc-grid');sg.innerHTML=cur.services.map(s=>`<div class="svc"><div class="ic"><svg viewBox="0 0 24 24">${ICON[s.i]}</svg></div><h3>${s.t}</h3><p>${s.d}</p></div>`).join('');
  $('#feat-list').innerHTML=cur.feat_list.map(t=>`<li><span class="ck">✓</span>${t}</li>`).join('');
  $('#flow-steps').innerHTML=cur.steps.map((s,i)=>`<div class="fstep" data-i="${i}"><div class="nd">${['◍','◎','▦','▤','◷','✓'][i]}</div><div><div class="t">${s.t}</div><div class="s">${s.s}</div></div></div>`).join('');
  $('#flow-side').innerHTML=cur.side.map(r=>`<div class="row"><span class="k">${r.k}</span><span class="v${r.up?' up':''}">${r.v}</span></div>`).join('');
  $('#cfg-tabs').innerHTML=cur.cfg_tabs.map((t,i)=>`<button class="${i===0?'on':''}" data-preset="${['studio','villa','tower'][i]}">${t}</button>`).join('');
  $('#cfg-opts').innerHTML=cur.cfg_opts.map((o,i)=>`<div class="opt${o.k==='solar'?' on':''}" data-opt="${o.k}"><span>${o.l}</span><span class="toggle"></span></div>`).join('');
  $('#cfg-chips').innerHTML=cur.cfg_chips.map(c=>`<div class="c"><span>+</span>${c}</div>`).join('');
  $('#ind-grid').innerHTML=cur.industries.map(s=>`<div class="svc"><div class="ic"><svg viewBox="0 0 24 24">${ICON[s.i]}</svg></div><h3>${s.t}</h3><p>${s.d}</p></div>`).join('');
  $('#cases').innerHTML=cur.cases.map(c=>`<div class="case"><div class="thumb" style="background-image:url('${c.p}'),linear-gradient(135deg,${c.c1},${c.c2})"><span class="ind">${c.tag}</span></div><div class="body"><div class="tag">${c.tag}</div><h3>${c.t}</h3><p>${c.d}</p><div class="metric"><span class="big">${c.m}</span><span class="sm">${c.l}</span></div></div></div>`).join('');
  $('#tlist').innerHTML=cur.tests.map(t=>{const ini=t.n.split(' ').map(w=>w[0]).join('').slice(0,2);return `<div class="tcard"><div class="stars">★★★★★</div><p class="q">${t.q}</p><div class="who"><div class="av" style="background:linear-gradient(135deg,${t.c},#FFE9A3)">${ini}</div><div><div class="nm">${t.n}</div><div class="ro">${t.r}</div></div></div></div>`;}).join('');
  $('#statband').innerHTML=cur.stats.map(s=>`<div class="stat"><div class="n">${s.n}</div><div class="l">${s.l}</div></div>`).join('');
  bindConfigUI();
  reformatCounters();
  observeReveals();
}

/* language switch */
function setLang(l){
  lang=l;cur=L[l];
  const rtl=(l==='ar');
  document.documentElement.lang=l;
  document.documentElement.dir=rtl?'rtl':'ltr';
  $$('#langsw button').forEach(b=>b.classList.toggle('on',b.dataset.lang===l));
  render();
}
$$('#langsw button').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));

setInterval(()=>{const s=$$('#automation .fstep');if(!s.length)return;s.forEach(x=>x.classList.remove('act'));const a=s.filter(x=>x.classList.contains('act'));let i=0;s.forEach((x,k)=>{if(x.dataset.k==='1')i=k;});window.__fi=(window.__fi==null?0:(window.__fi+1)%s.length);s[window.__fi].classList.add('act');},1100);

function spark(svg,seed){const w=160,h=30,n=20;let pts=[],y=h/2;for(let i=0;i<n;i++){y+=Math.sin(i*.7+seed)*3+(Math.random()*5-2.5);y=Math.max(6,Math.min(h-4,y));pts.push([i/(n-1)*w,y]);}const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');svg.setAttribute('viewBox',`0 0 ${w} ${h}`);svg.innerHTML=`<path d="${d}" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>`;const p=svg.querySelector('path'),len=p.getTotalLength();p.style.strokeDasharray=len;p.style.strokeDashoffset=len;p.animate([{strokeDashoffset:len},{strokeDashoffset:0}],{duration:1300,easing:'ease',fill:'forwards'});}
$$('[data-spark]').forEach(s=>spark(s,parseInt(s.dataset.spark)*2.1));

  const panels=[];defs.forEach(d=>{const tex=panel(d.k);const w=3.0*d.scl,h=w*(340/520);const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false}));m.position.set(...d.pos);m.rotation.y=d.r||0;m.userData={base:d.pos.slice(),ph:Math.random()*6.28,amp:.12+Math.random()*.12};root.add(m);panels.push(m);});

  const lineGeo=new THREE.BufferGeometry();const lineObj=new THREE.LineSegments(lineGeo,new THREE.LineBasicMaterial({color:0xD4AF37,transparent:true,opacity:.22,blending:THREE.AdditiveBlending}));root.add(lineObj);

/* ===== CONFIGURATOR 3D ===== */
let cfgState={preset:'studio',solar:true,glass:false,pergola:false},cfgFacade=null,cfgBuild=null;
(function(){
  if(typeof THREE==='undefined')return;
  const canvas=$('#cfg-canvas');if(!canvas)return;let renderer;try{renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});}catch(e){return;}
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  const scene=new THREE.Scene();const cam=new THREE.PerspectiveCamera(42,1,.1,100);cam.position.set(6,4.8,8.5);
  scene.add(new THREE.AmbientLight(0xffffff,.85));const key=new THREE.DirectionalLight(0xffffff,1.0);key.position.set(6,11,6);scene.add(key);const fill=new THREE.DirectionalLight(0xfff0c8,.5);fill.position.set(-7,4,-5);scene.add(fill);
  const model=new THREE.Group();scene.add(model);cfgFacade=new THREE.Color('#cdd6e6');
  const mats={facade:new THREE.MeshStandardMaterial({color:cfgFacade,roughness:.62,metalness:.05}),glass:new THREE.MeshStandardMaterial({color:0xbfe0ff,roughness:.08,metalness:.1,transparent:true,opacity:.5}),dark:new THREE.MeshStandardMaterial({color:0x2b3447,roughness:.7}),plat:new THREE.MeshStandardMaterial({color:0xe8edf5,roughness:.9}),solar:new THREE.MeshStandardMaterial({color:0x1e3a8a,roughness:.3,metalness:.4})};
  function clear(g){while(g.children.length)g.remove(g.children[0]);}
  function box(w,h,d,m,x,y,z){const me=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);me.position.set(x,y,z);model.add(me);return me;}
  cfgBuild=function(){clear(model);const plat=new THREE.Mesh(new THREE.CylinderGeometry(4.6,4.6,.3,52),mats.plat);plat.position.y=-1.25;model.add(plat);const ring=new THREE.Mesh(new THREE.TorusGeometry(4.6,.035,8,72),new THREE.MeshBasicMaterial({color:0xD4AF37}));ring.rotation.x=Math.PI/2;ring.position.y=-1.08;model.add(ring);const fmat=cfgState.glass?mats.glass:mats.facade;
    if(cfgState.preset==='studio'){box(4,2.4,3,fmat,0,.2,0);box(4.2,.3,3.2,mats.dark,0,1.55,0);box(.12,2.4,.12,mats.dark,1.9,.2,1.4);box(.12,2.4,.12,mats.dark,-1.9,.2,1.4);if(cfgState.solar)box(3.4,.06,2.4,mats.solar,0,1.73,0);}
    else if(cfgState.preset==='villa'){box(3,2,3,fmat,0,0,0);box(2.4,1.6,2.4,fmat,1.4,-.2,.4);box(5,.2,3.2,mats.plat,1.2,-1.0,1.8);box(3.2,.25,3.2,mats.dark,0,1.1,0);if(cfgState.solar)box(2.6,.06,2.6,mats.solar,0,1.26,0);}
    else{for(let i=0;i<5;i++)box(2.6-i*.18,1,2.6-i*.18,i%2?fmat:mats.plat,0,-.6+i,0);box(.12,5,.12,mats.dark,1.2,1.4,1.2);if(cfgState.solar)box(1.6,.06,1.6,mats.solar,0,4,0);}
    if(cfgState.pergola){const py=cfgState.preset==='tower'?4.4:(cfgState.preset==='villa'?1.4:1.9);for(let i=-2;i<=2;i++)box(.08,.08,3.4,mats.dark,i*.7,py,0);box(3.4,.08,.08,mats.dark,0,py,1.6);box(3.4,.08,.08,mats.dark,0,py,-1.6);}mats.facade.color.copy(cfgFacade);};
  cfgBuild();
  let drag=false,lastX=0,rotY=.6,vel=.004;
  canvas.addEventListener('pointerdown',e=>{drag=true;lastX=e.clientX;canvas.setPointerCapture(e.pointerId);});
  canvas.addEventListener('pointermove',e=>{if(drag){const dx=e.clientX-lastX;rotY+=dx*.01;lastX=e.clientX;vel=dx*.0006;}});
  addEventListener('pointerup',()=>drag=false);
  function size(){const w=canvas.clientWidth,h=canvas.clientHeight;if(!w||!h)return;renderer.setSize(w,h,false);cam.aspect=w/h;cam.updateProjectionMatrix();}size();addEventListener('resize',size);setTimeout(size,300);
  let run=true;new IntersectionObserver(e=>run=e[0].isIntersecting,{threshold:0}).observe(canvas);
  function loop(){requestAnimationFrame(loop);if(!run)return;if(!drag&&!reduce){rotY+=vel;vel+=(.004-vel)*.02;}model.rotation.y=rotY;cam.lookAt(0,.4,0);renderer.render(scene,cam);}loop();
})();
