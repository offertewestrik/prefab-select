# ============================================================================
# Firebase App Hosting — Prefab Select CRM
# Docs: https://firebase.google.com/docs/app-hosting/configure
# Bevat Resend-, Supabase- en Google/Gmail-koppeling via Firebase secrets.
# ============================================================================

runConfig:
  minInstances: 0
  maxInstances: 2

env:
  # --- Feature flag: echte koppelingen aanzetten (i.p.v. mocks) ---
  - variable: USE_REAL_INTEGRATIONS
    value: "true"
    availability:
      - BUILD
      - RUNTIME

  # --- Resend (offertes & facturen mailen) ---
  - variable: RESEND_FROM_EMAIL
    value: offerte@prefabselect.nl
    availability:
      - BUILD
      - RUNTIME
  - variable: RESEND_API_KEY
    secret: resend-api-key
    availability:
      - BUILD
      - RUNTIME

  # --- Supabase (database) ---
  - variable: NEXT_PUBLIC_SUPABASE_URL
    value: https://numqnwpkvlcxtvkiytmi.supabase.co
    availability:
      - BUILD
      - RUNTIME
  - variable: SUPABASE_SERVICE_ROLE_KEY
    secret: supabase-service-key
    availability:
      - BUILD
      - RUNTIME

  # --- Google / Gmail (mailen vanuit CRM) ---
  - variable: GOOGLE_REDIRECT_URI
    value: https://prefab-select--crm-systeem-prefab-select.europe-west4.hosted.app/api/integrations/google/callback
    availability:
      - BUILD
      - RUNTIME
  - variable: GOOGLE_CLIENT_ID
    secret: google-client-id
    availability:
      - BUILD
      - RUNTIME
  - variable: GOOGLE_CLIENT_SECRET
    secret: google-client-secret
    availability:
      - BUILD
      - RUNTIME

  # --- Team-toegang (inlogwachtwoord) ---
  - variable: CRM_PASSWORD
    secret: crm-password
    availability:
      - BUILD
      - RUNTIME

